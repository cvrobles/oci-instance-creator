name: OCI Free Tier Bot Runner
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-creator:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Oracle Launch Request Natively
        env:
          USER_OCID: ${{ secrets.OCI_USER_OCID }}
          TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          REGION: ${{ secrets.OCI_REGION }}
          COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          SUBNET_OCID: ${{ secrets.OCI_SUBNET_OCID }}
          IMAGE_OCID: ${{ secrets.OCI_IMAGE_OCID }}
          SSH_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          KEY_FILE_CONTENT: ${{ secrets.OCI_KEY_FILE }}
        run: |
          cat << 'EOF' > run.js
          const crypto = require('crypto');
          const https = require('https');

          function signRequest(options, key, keyId) {
            const apiKey = crypto.createPrivateKey(key);
            const headersToSign = ['(request-target)', 'host', 'date'];
            let signString = `(request-target): ${options.method.toLowerCase()} ${options.path}\nhost: ${options.host}\ndate: ${options.headers['date']}`;
            if (options.headers['content-length'] !== undefined) {
              headersToSign.push('x-content-sha256', 'content-type', 'content-length');
              signString += `\nx-content-sha256: ${options.headers['x-content-sha256']}\ncontent-type: ${options.headers['content-type']}\content-length: ${options.headers['content-length']}`;
            }
            const signature = crypto.sign("sha256", Buffer.from(signString), apiKey).toString("base64");
            options.headers['Authorization'] = `Signature version="1",keyId="${keyId}",algorithm="rsa-sha256",headers="${headersToSign.join(' ')}",signature="${signature}"`;
          }

          async function makeRequest(method, host, path, body = null) {
            const dateStr = new Date().toUTCString();
            const headers = { 'date': dateStr, 'host': host, 'accept': 'application/json' };
            if (body) {
              const bodyStr = JSON.stringify(body);
              headers['content-type'] = 'application/json';
              headers['content-length'] = Buffer.byteLength(bodyStr).toString();
              headers['x-content-sha256'] = crypto.createHash('sha256').update(bodyStr).digest('base64');
            }
            const options = { hostname: host, method: method, path: path, headers: headers };
            signRequest(options, process.env.KEY_FILE_CONTENT, `${process.env.TENANCY_OCID}/${process.env.USER_OCID}/${process.env.FINGERPRINT}`);
            return new Promise((resolve, reject) => {
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve({ status: res.statusCode, body: data }));
              });
              req.on('error', reject);
              if (body) req.write(JSON.stringify(body));
              req.end();
            });
          }

          (async () => {
            const host = `iaas.${process.env.REGION}.oraclecloud.com`;
            const identityHost = `identity.${process.env.REGION}.oraclecloud.com`;
            try {
              console.log("Fetching data center Availability Domains...");
              const adRes = await makeRequest('GET', identityHost, `/20160918/availabilityDomains?compartmentId=${encodeURIComponent(process.env.COMPARTMENT_OCID)}`);
              if (adRes.status !== 200) throw new Error(`Failed to list ADs: ${adRes.body}`);
              const ads = JSON.parse(adRes.body);
              const targetAD = ads[0].name;
              console.log(`Targeting Availability Domain: ${targetAD}`);

              const payload = {
                compartmentId: process.env.COMPARTMENT_OCID,
                availabilityDomain: targetAD,
                shape: "VM.Standard.A1.Flex",
                shapeConfig: { ocpus: 2, memoryInGBs: 12 },
                subnetId: process.env.SUBNET_OCID,
                imageId: process.env.IMAGE_OCID,
                displayName: "AlwaysFreeUbuntu",
                metadata: { "ssh_authorized_keys": process.env.SSH_KEY },
                assignPublicIp: true,
                bootVolumeSizeInGBs: "50"
              };

              console.log("Submitting server creation payload to Oracle Cloud...");
              const launchRes = await makeRequest('POST', host, '/20160918/instances', payload);
              console.log(`Server Status Code: ${launchRes.status}`);
              console.log(`Server Response: ${launchRes.body}`);
            } catch (err) {
              console.error("Execution Error:", err.message);
              process.exit(1);
            }
          })();
          EOF
          node run.js
