name: OCI Free Tier Bot Runner
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-creator:
    runs-on: ubuntu-latest
    steps:
      - name: Force Install and Execute OCI Commands Natively
        run: |
          # 1. Download and install Oracle CLI into the local path immediately
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          export PATH="/home/runner/bin:$PATH"
          
          # 2. Build the secure connection folder
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_KEY_FILE }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          
          cat << EOF > ~/.oci/config
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=~/.oci/oci_api_key.pem
          EOF
          chmod 600 ~/.oci/config
          
          # 3. Target the data center region domain
          REGION_PREFIX=$(oci iam availability-domain list --query "data.name" --raw-output | head -n 1)
          
          # 4. Trigger the immediate server build request
          oci compute instance launch \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_OCID }}" \
            --availability-domain "$REGION_PREFIX" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":2,"memoryInGBs":12}' \
            --subnet-id "${{ secrets.OCI_SUBNET_OCID }}" \
            --image-id "${{ secrets.OCI_IMAGE_OCID }}" \
            --display-name "AlwaysFreeUbuntu" \
            --ssh-authorized-keys "${{ secrets.SSH_PUBLIC_KEY }}" \
            --assign-public-ip true \
            --boot-volume-size-in-gbs 50
