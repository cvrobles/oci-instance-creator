name: OCI Free Tier Bot Runner
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-creator:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Oracle Instance Creator Container
        env:
          # This maps your secrets to secure environmental blocks BEFORE running bash
          USER_OCID: ${{ secrets.OCI_USER_OCID }}
          TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          REGION: ${{ secrets.OCI_REGION }}
          SUBNET_OCID: ${{ secrets.OCI_SUBNET_OCID }}
          IMAGE_OCID: ${{ secrets.OCI_IMAGE_OCID }}
          COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          SSH_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          # This prevents line break distortion on the API key
          OCI_KEY_CONTENT: "${{ secrets.OCI_KEY_FILE }}"
        run: |
          docker run --rm \
            -e USER_OCID \
            -e TENANCY_OCID \
            -e FINGERPRINT \
            -e REGION \
            -e SUBNET_OCID \
            -e IMAGE_OCID \
            -e COMPARTMENT_OCID \
            -e OCI_KEY_CONTENT \
            -e SSH_KEY \
            -e SHAPE="VM.Standard.A1.Flex" \
            -e CPUS="2" \
            -e VOLUME_SIZE="50" \
            ghcr.io/mowirth/oci-instance-creator:latest
